<section class="wn-section wn-section--tight wn-carousel">
    <div class="wn-container">
        <div class="carousel slide" data-bs-ride="carousel" id="mycarousel">
            <ol class="carousel-indicators">
                <li data-bs-target="#mycarousel" data-bs-slide-to="0" class="active"></li>
                <li data-bs-target="#mycarousel" data-bs-slide-to="1"></li>
                <li data-bs-target="#mycarousel" data-bs-slide-to="2"></li>
                <li data-bs-target="#mycarousel" data-bs-slide-to="3"></li>
            </ol>
            <div class="carousel-inner" style="border-radius:10px; overflow:hidden;">
                <div class="carousel-item active" data-bs-interval="3000">
                    <img src="../static/images/crime_1.jpg" class="d-block" width="100%" height="440" alt="Community safety patrol">
                    <div class="carousel-caption d-none d-md-block">
                        <h4>Stay alert</h4>
                        <p>Every tip helps keep your neighbourhood safer.</p>
                    </div>
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="../static/images/fire.jpeg" class="d-block" width="100%" height="440" alt="Fire response">
                    <div class="carousel-caption d-none d-md-block">
                        <h4>Fire outbreaks</h4>
                        <p>Report early — minutes matter.</p>
                    </div>
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="../static/images/crime_2a.jpg" class="d-block" width="100%" height="440" alt="Road accident response">
                    <div class="carousel-caption d-none d-md-block">
                        <h4>Road accidents</h4>
                        <p>Fast reports mean faster emergency response.</p>
                    </div>
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="../static/images/murder23.avif" class="d-block" width="100%" height="440" alt="Community watch">
                    <div class="carousel-caption d-none d-md-block">
                        <h4>Serious crime</h4>
                        <p>Your report goes straight to the duty desk.</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#mycarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#mycarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>
</section>
