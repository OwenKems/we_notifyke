<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruit an Officer — WeNotify Kenya</title>
    <link rel="stylesheet" href="../static/css/bootstrap.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body style="background: var(--ink); min-height:100vh;">

    <section class="wn-section" style="padding-top:64px;">
        <div class="wn-container">
            <div class="wn-panel">
                <p class="eyebrow">Chief admin &middot; officer records</p>
                <h2>Recruit an Officer</h2>
                <p class="sub">Add a new police officer account to the system.</p>

                {% if error %}<div class="wn-alert error">{{ error }}</div>{% endif %}
                {% if success %}<div class="wn-alert success">{{ success }}</div>{% endif %}
                {% if message %}<div class="wn-alert error">{{ message }}</div>{% endif %}

                <form action="/logoff" method="post">
                    <div class="wn-field">
                        <label for="badge_no">Badge number</label>
                        <input type="text" id="badge_no" name="badge_no" placeholder="Enter police badge no">
                    </div>
                    <div class="wn-field">
                        <label for="tell">Phone number</label>
                        <input type="tel" id="tell" name="tell" placeholder="Enter phone number">
                    </div>
                    <div class="wn-row-2">
                        <div class="wn-field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter password">
                        </div>
                        <div class="wn-field">
                            <label for="confirm_password">Confirm password</label>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password">
                        </div>
                    </div>
                    <div class="wn-cta-row">
                        <button type="submit" class="btn btn-primary">Create Account</button>
                        <a href="/login" class="btn btn-danger">Log Out</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
