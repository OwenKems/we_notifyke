<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chief Admin Login — WeNotify Kenya</title>
    <link rel="stylesheet" href="../static/css/bootstrap.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body style="background: var(--ink); min-height:100vh;">

    <section class="wn-section" style="padding-top:64px;">
        <div class="wn-container">
            <div class="wn-panel">
                <p class="eyebrow">Restricted access</p>
                <h2>Chief Admin</h2>
                <p class="sub">Sign in to manage officer accounts and oversee reported cases.</p>

                {% if error %}<div class="wn-alert error">{{ error }}</div>{% endif %}
                {% if success %}<div class="wn-alert success">{{ success }}</div>{% endif %}
                {% if message %}<div class="wn-alert error">{{ message }}</div>{% endif %}

                <form action="/login" method="post">
                    <div class="wn-field">
                        <label for="chief_badge_no">Chief badge number</label>
                        <input type="text" id="chief_badge_no" name="chief_badge_no" placeholder="Enter your chief badge no">
                    </div>
                    <div class="wn-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
