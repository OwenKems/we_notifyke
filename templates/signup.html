<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — WeNotify Kenya</title>
    <link rel="stylesheet" href="../static/css/bootstrap.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

    {% include 'nav-bar.html' %}

    <section class="wn-section" style="padding-top:56px;">
        <div class="wn-container">
            <div class="wn-panel">
                <p class="eyebrow">Join WeNotify</p>
                <h2>Create your account</h2>
                <p class="sub">Sign up to track the reports you file and get status updates.</p>

                {% if error %}<div class="wn-alert error">{{ error }}</div>{% endif %}
                {% if success %}<div class="wn-alert success">{{ success }}</div>{% endif %}
                {% if message %}<div class="wn-alert error">{{ message }}</div>{% endif %}

                <form action="/signup" method="post">
                    <div class="wn-field">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter username">
                    </div>
                    <div class="wn-field">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="Enter email address">
                    </div>
                    <div class="wn-field">
                        <label for="phone">Phone number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
                    </div>
                    <div class="wn-row-2">
                        <div class="wn-field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter password">
                        </div>
                        <div class="wn-field">
                            <label for="confirm_password">Confirm password</label>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                </form>
            </div>
        </div>
    </section>

    {% include 'footer.html' %}

</body>
</html>
